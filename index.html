<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM OVERRIDE: STUDY_MODE_v2026</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Syncopate:wght@700&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #ff0055;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Animated Mesh Background */
        .mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(0, 242, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 0, 85, 0.15) 0px, transparent 50%);
            z-index: -1;
            animation: meshMove 10s ease infinite alternate;
        }

        @keyframes meshMove {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        /* Step 1: The Billion Dollar Entrance */
        #entrance {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: black;
            z-index: 9999;
            transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .scanner {
            width: 300px;
            height: 300px;
            border: 2px solid var(--primary);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            box-shadow: 0 0 50px var(--primary);
        }

        .scanner::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .auth-btn {
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            transition: 0.3s;
            overflow: hidden;
            position: relative;
        }

        .auth-btn:hover {
            background: var(--primary);
            color: black;
            box-shadow: 0 0 30px var(--primary);
        }

        /* Step 2: The Main Prank Canvas */
        #main-stage {
            display: none;
            height: 100vh;
            width: 100vw;
            position: relative;
            padding: 40px;
        }

        /* Futuristic HUD Elements */
        .hud-box {
            position: absolute;
            padding: 20px;
            border-left: 4px solid var(--secondary);
            background: var(--glass);
            backdrop-filter: blur(10px);
            font-family: 'Orbitron', sans-serif;
        }

        .top-left { top: 20px; left: 20px; }
        .top-right { top: 20px; right: 20px; text-align: right; }
        .bottom-left { bottom: 20px; left: 20px; }

        .stat-value {
            font-size: 2rem;
            color: var(--secondary);
            text-shadow: 0 0 10px var(--secondary);
        }

        /* THE VIDEO CONTAINER - THE HEART OF THE PRANK */
        .video-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70vw;
            max-width: 1000px;
            aspect-ratio: 16/9;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 100px rgba(255, 0, 85, 0.4);
            z-index: 10;
            background: black;
        }

        #player {
            width: 100%;
            height: 100%;
        }

        .glitch-title {
            position: absolute;
            top: 10%;
            width: 100%;
            text-align: center;
            font-family: 'Syncopate', sans-serif;
            font-size: 4rem;
            color: white;
            text-shadow: 2px 2px var(--secondary), -2px -2px var(--primary);
            animation: glitch 0.2s infinite;
            z-index: 5;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0); }
        }

        /* Floating 2026 Elements */
        .particle {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="mesh"></div>

    <!-- HIGH-END ENTRANCE TRAP -->
    <div id="entrance">
        <h2 style="font-family: 'Orbitron'; margin-bottom: 20px; letter-spacing: 10px; color: #555;">SECURITY CHECK</h2>
        <div class="scanner">
            <span id="load-text" style="font-family: 'Orbitron'; font-size: 0.8rem; color: var(--primary);">SCANNING...</span>
        </div>
        <p style="margin-top: 30px; opacity: 0.6; text-align: center;">BIOMETRIC AUTHENTICATION REQUIRED<br>FOR FREE 2026 EXAM TOPPER NOTES</p>
        <button class="auth-btn" onclick="engagePrank()">AUTHORIZE & ENTER</button>
    </div>

    <!-- THE MULTI-BILLION DOLLAR STAGE -->
    <div id="main-stage">
        <div class="glitch-title">PADHAI KYU NAHI HO RAHI?</div>

        <div class="hud-box top-left">
            <div>CURRENT STATUS:</div>
            <div class="stat-value">FAILING...</div>
            <div style="font-size: 0.7rem; margin-top: 10px;">FUTURE SECURED: 0.00%</div>
        </div>

        <div class="hud-box top-right">
            <div>TIME WASTED TODAY:</div>
            <div class="stat-value" id="timer">00:00:00</div>
            <div style="font-size: 0.7rem; margin-top: 10px;">BRAIN CELLS REMAINING: 4</div>
        </div>

        <div class="hud-box bottom-left">
            <div>DETECTED ACTIVITY:</div>
            <div class="stat-value" style="color: var(--primary);">REEL SCROLLING</div>
        </div>

        <!-- CENTERED VIDEO -->
        <div class="video-wrapper">
            <div id="player"></div>
        </div>
    </div>

    <!-- Sound FX for the entrance -->
    <audio id="beep" src="https://www.soundjay.com/buttons/beep-01a.mp3"></audio>

    <script>
        // YouTube API Loading
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: 'f_YpI9S5j1A', // The scolding video
                playerVars: {
                    'autoplay': 1,
                    'controls': 0,
                    'modestbranding': 1,
                    'rel': 0,
                    'showinfo': 0,
                    'iv_load_policy': 3
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // Prepared but hidden
        }

        function engagePrank() {
            // Play a techy beep sound
            document.getElementById('beep').play();
            
            // Hide entrance with a high-end transition
            const entrance = document.getElementById('entrance');
            entrance.style.transform = 'scale(2)';
            entrance.style.opacity = '0';
            
            setTimeout(() => {
                entrance.style.display = 'none';
                document.getElementById('main-stage').style.display = 'block';
                
                // UNMUTE AND PLAY IMMEDIATELY (Browser allows it now because of the click)
                player.unMute();
                player.playVideo();
                player.setVolume(100);
                
                // Start the high-end background effects
                startHUD();
                createParticles();
            }, 600);
        }

        function startHUD() {
            // Fake timer for time wasted
            let sec = 0;
            setInterval(() => {
                sec++;
                let m = Math.floor(sec/60);
                let s = sec % 60;
                document.getElementById('timer').innerText = `00:${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            }, 1000);
        }

        function createParticles() {
            for(let i=0; i<50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 3 + 'px';
                p.style.width = size;
                p.style.height = size;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = Math.random() * 100 + 'vh';
                document.body.appendChild(p);
                
                // Animate them floating
                p.animate([
                    { transform: 'translateY(0) rotate(0)' },
                    { transform: `translateY(-100vh) rotate(${Math.random()*360}deg)` }
                ], {
                    duration: Math.random() * 5000 + 5000,
                    iterations: Infinity
                });
            }
        }
    </script>
</body>
</html>
